<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Left</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Onboarding -->
  <div id="onboarding" class="onboarding hidden">
    <div class="onboarding-card">
      <h1>Life Left in Weeks</h1>
      <p class="onboarding-subtitle">You have roughly <strong>4,000 weeks</strong> to build something meaningful. Let's see how far you've come.</p>
      <form id="onboarding-form">
        <label for="user-name-input">Your name</label>
        <input type="text" id="user-name-input" placeholder="Enter your name" required>
        <label for="birth-date-input">Your birth date</label>
        <input type="date" id="birth-date-input" required>
        <label for="life-expectancy-input">
          Life expectancy: <span id="expectancy-value">76</span> years
        </label>
        <input type="range" id="life-expectancy-input" min="50" max="100" value="76">
        <button type="submit" class="btn-primary">See My Life</button>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app hidden">
    <!-- Settings Gear (top right) -->
    <button id="settings-btn" class="settings-btn" aria-label="Settings">
      <svg width="22" height="22" viewBox="0 0 20 20" fill="none">
        <path d="M10 13a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="1.5"/>
        <path d="M17.4 12.3a1.3 1.3 0 00.26 1.43l.05.05a1.58 1.58 0 11-2.24 2.24l-.05-.05a1.3 1.3 0 00-1.43-.26 1.3 1.3 0 00-.79 1.19v.14a1.58 1.58 0 11-3.16 0v-.07A1.3 1.3 0 009.2 15.8a1.3 1.3 0 00-1.43.26l-.05.05a1.58 1.58 0 11-2.24-2.24l.05-.05a1.3 1.3 0 00.26-1.43 1.3 1.3 0 00-1.19-.79h-.14a1.58 1.58 0 110-3.16h.07A1.3 1.3 0 005.8 7.5a1.3 1.3 0 00-.26-1.43l-.05-.05a1.58 1.58 0 112.24-2.24l.05.05a1.3 1.3 0 001.43.26h.06a1.3 1.3 0 00.79-1.19v-.14a1.58 1.58 0 113.16 0v.07a1.3 1.3 0 00.79 1.19 1.3 1.3 0 001.43-.26l.05-.05a1.58 1.58 0 112.24 2.24l-.05.05a1.3 1.3 0 00-.26 1.43v.06a1.3 1.3 0 001.19.79h.14a1.58 1.58 0 010 3.16h-.07a1.3 1.3 0 00-1.19.79z" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </button>

    <!-- Three-column layout -->
    <div class="main-layout">
      <!-- LEFT: Weeks Lived Grid -->
      <div class="panel panel-left">
        <div class="panel-header">
          <span id="hero-weeks-lived" class="hero-number lived"></span>
          <span id="label-lived" class="hero-label">WEEKS LIVED</span>
        </div>
        <div id="grid-lived" class="life-grid"></div>
      </div>

      <!-- CENTER: Name + Stats -->
      <div class="panel panel-center">
        <h1 id="user-name-display" class="hero-name"></h1>
        <div class="center-meta">
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <p id="percent-text" class="percent-text"></p>
        </div>
        <div class="current-marker">
          <span class="current-dot"></span>
          <span class="current-text">THIS WEEK</span>
        </div>
        <p id="quote" class="quote"></p>
        <div class="toggle-group">
          <button id="toggle-weeks" class="toggle-btn active">Weeks</button>
          <button id="toggle-days" class="toggle-btn">Days</button>
        </div>
      </div>

      <!-- RIGHT: Weeks Left Grid -->
      <div class="panel panel-right">
        <div class="panel-header">
          <span id="hero-weeks-left" class="hero-number remaining"></span>
          <span id="label-left" class="hero-label">WEEKS TO CREATE</span>
        </div>
        <div id="grid-remaining" class="life-grid"></div>
      </div>
    </div>

    <!-- Tooltip -->
    <div id="tooltip" class="tooltip hidden"></div>

    <!-- Milestone Popover -->
    <div id="milestone-popover" class="milestone-popover hidden">
      <form id="milestone-form">
        <input type="text" id="milestone-label" placeholder="What happened?" maxlength="50" required>
        <div id="emoji-picker" class="emoji-picker"></div>
        <div class="popover-actions">
          <button type="button" id="milestone-delete" class="btn-delete hidden">Delete</button>
          <button type="submit" class="btn-primary btn-small">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Settings Drawer -->
  <div id="settings-overlay" class="settings-overlay hidden"></div>
  <div id="settings-drawer" class="settings-drawer hidden">
    <div class="drawer-header">
      <h2>Settings</h2>
      <button id="settings-close" class="settings-close">&times;</button>
    </div>
    <div class="drawer-content">
      <div class="setting-group">
        <label for="settings-username">Name</label>
        <input type="text" id="settings-username">
      </div>
      <div class="setting-group">
        <label for="settings-birthdate">Birth Date</label>
        <input type="date" id="settings-birthdate">
      </div>
      <div class="setting-group">
        <label for="settings-expectancy">
          Life Expectancy: <span id="settings-expectancy-value">76</span> years
        </label>
        <input type="range" id="settings-expectancy" min="50" max="100" value="76">
      </div>
      <button id="settings-save" class="btn-primary">Save Changes</button>

      <hr class="drawer-divider">

      <h3>Milestones</h3>
      <div id="milestone-list" class="milestone-list"></div>
      <h4>Quick Add</h4>
      <div id="milestone-suggestions" class="milestone-suggestions"></div>

      <hr class="drawer-divider">

      <button id="clear-data" class="btn-danger">Clear All Data</button>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/milestones.js"></script>
  <script src="js/grid.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
